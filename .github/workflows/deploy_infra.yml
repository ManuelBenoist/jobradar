name: Infrastructure Deployment (Terraform)

# Ce workflow automatise le provisionnement des ressources AWS.
# Il gère l'installation des dépendances Lambda, l'initialisation de Terraform
# et l'application sécurisée du plan d'infrastructure.
on:
  push:
    branches: [ main ]
    # Le déploiement ne se déclenche que si le code des Lambdas ou les fichiers Terraform changent
    paths:
      - 'src/lambda/**'
      - 'terraform/**'
  workflow_dispatch: # Permet une exécution manuelle pour la maintenance de l'infra

jobs:
  terraform-deploy:
    name: Terraform Init, Plan & Apply
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Bundle Lambda dependencies
        run: |
          # Installation des bibliothèques nécessaires directement dans les dossiers sources.
          # Cette étape est cruciale pour que Terraform puisse créer des archives .zip valides.
          for dir in adzuna france_travail jsearch jooble; do
            pip install requests --target src/lambda/$dir/
          done

      - name: Terraform Init
        working-directory: ./terraform
        env:
          TF_VAR_athena_staging_dir: "s3://jobradar-athena-results-manuel-cloud/athena-temp/"
        run: terraform init

      - name: Terraform Validate
        working-directory: ./terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: ./terraform
        env:
          TF_VAR_jsearch_api_key: ${{ secrets.JSEARCH_API_KEY }}
          TF_VAR_jooble_api_key: ${{ secrets.JOOBLE_API_KEY }}
          TF_VAR_adzuna_app_id: ${{ secrets.ADZUNA_APP_ID }}
          TF_VAR_adzuna_app_key: ${{ secrets.ADZUNA_APP_KEY }}
          TF_VAR_ft_client_id: ${{ secrets.FRANCE_TRAVAIL_CLIENT_ID }}
          TF_VAR_ft_client_secret: ${{ secrets.FRANCE_TRAVAIL_CLIENT_SECRET }}
          TF_VAR_internal_api_key: ${{ secrets.INTERNAL_API_KEY }}
          TF_VAR_athena_staging_dir: "s3://jobradar-athena-results-manuel-cloud/athena-temp/"
        run: terraform plan -no-color

      - name: Terraform Apply
        working-directory: ./terraform
        env:
          # Injection des secrets GitHub dans les variables Terraform via le préfixe TF_VAR_
          TF_VAR_jsearch_api_key: ${{ secrets.JSEARCH_API_KEY }}
          TF_VAR_jooble_api_key: ${{ secrets.JOOBLE_API_KEY }}
          TF_VAR_adzuna_app_id: ${{ secrets.ADZUNA_APP_ID }}
          TF_VAR_adzuna_app_key: ${{ secrets.ADZUNA_APP_KEY }}
          TF_VAR_ft_client_id: ${{ secrets.FRANCE_TRAVAIL_CLIENT_ID }}
          TF_VAR_ft_client_secret: ${{ secrets.FRANCE_TRAVAIL_CLIENT_SECRET }}
          TF_VAR_internal_api_key: ${{ secrets.INTERNAL_API_KEY }}
          TF_VAR_athena_staging_dir: "s3://jobradar-athena-results-manuel-cloud/athena-temp/"
        run: |
          # Initialisation des providers et du backend
          terraform init
          # Application automatique des changements d'infrastructure
          terraform apply -auto-approve