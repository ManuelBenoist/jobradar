name: JobRadar Quality Assurance

# Ce workflow s'assure de la qualité du code à chaque modification.
# Il valide la conformité aux standards PEP8 et prépare l'exécution des tests.
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  quality-check:
    name: Linting & Unit Testing
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # Le caching permet d'accélérer les exécutions futures du workflow
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
          # Installation des dépendances du projet
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
      - name: Run Ruff (Static Analysis)
        run: |
          # Ruff remplace Flake8/Isort avec des performances accrues.
          # On vérifie la conformité PEP8 et les erreurs potentielles.
          ruff check .

      - name: Run Pytest (Unit Tests)
        # Note : Étape configurée pour ne pas bloquer le pipeline tant que 
        # la suite de tests est en cours de restructuration.
        run: |
          # Recherche et exécution automatique des tests unitaires
          pytest || echo "Aucun test détecté ou suite de tests en cours de migration."