name: JobRadar Quality Assurance

# Ce workflow s'assure de la qualité du code à chaque modification.
# Il valide la conformité aux standards PEP8 et prépare l'exécution des tests.
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint-and-unit-tests:
    name: Linting & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # Le caching permet d'accélérer les exécutions futures du workflow
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pytest-cov httpx moto
          pip install fastapi mangum pyathena sentence-transformers torch
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Ruff (Static Analysis)
        run: ruff check .

      - name: Run Pytest with Coverage
        run: |
          python -m pytest tests/ --ignore=tests/integration --cov=src --cov-report=term-missing --cov-report=xml

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
