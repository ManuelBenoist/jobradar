# Configuration de la connexion à AWS Athena
# dbt-athena-community adapter
jobradar:
  target: dev
  outputs:
    dev:
      type: athena
      region_name: eu-west-3
      database: awsdatacatalog
      schema: jobradar_db
      work_group: jobradar_workgroup
      
      # Utilisation de variables d'environnement pour la flexibilité CI/CD et la sécurité
      s3_staging_dir: "{{ env_var('DBT_S3_STAGING_DIR') }}"
      s3_data_dir: "{{ env_var('DBT_S3_DATA_DIR') }}"
      
      threads: 4 # Optimisation du parallélisme pour les requêtes Athena