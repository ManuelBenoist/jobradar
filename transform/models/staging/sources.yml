version: 2

sources:
  - name: glue_silver
    description: >
      Zone de passage entre Spark (Processing) et dbt (Modeling).
      Ces données résident dans le catalogue AWS Glue et sont partitionnées par date.
    database: awsdatacatalog
    schema: jobradar_db
    tables:
      - name: silver_jobs
        description: "Offres d'emploi dédupliquées et normalisées par le moteur PySpark."
        external_location: "s3://jobradar-processed-manuel-cloud/silver_jobs/"
        columns:
          - name: job_id
            description: "Clé primaire technique générée (Hash SHA256)."
            tests:
              - unique
              - not_null

          - name: source_name
            description: "Nom de l'agrégateur d'origine (Adzuna, FT, Jooble, JSearch)."
            tests:
              - accepted_values:
                  values: ['Adzuna', 'France Travail', 'Jooble', 'JSearch']

          - name: published_at
            description: "Timestamp normalisé de publication de l'offre."
            tests:
              - not_null

          - name: title
            description: "Intitulé du poste."
            tests:
              - not_null:
                  severity: warn

          - name: company_name
            description: "Nom de l'entreprise recruteuse."
            tests:
              - not_null:
                  severity: warn

          - name: url
            description: "URL de l'offre originale."
            tests:
              - not_null:
                  severity: warn

          - name: salary_min_numeric
            description: "Valeur numérique du salaire annuel minimum (en Euros)."

          - name: data_quality_score
            description: "Score de qualité de la donnée basé sur la source (0.0 à 1.0)."
