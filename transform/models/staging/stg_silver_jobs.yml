version: 2

models:
  - name: stg_silver_jobs
    description: >
      Modèle de staging qui expose les données Silver. 
      Il sert d'interface de nettoyage final avant le calcul du matching score.
    columns:
      - name: job_id
        description: "Identifiant unique de l'offre."
        tests:
          - unique
          - not_null

      - name: ingestion_date
        description: "Clé de partitionnement correspondant à la date de traitement Spark."
        tests:
          - not_null

      - name: description_vector
        description: "Vecteur d'embedding (array) généré par Sentence-Transformers."
        
      - name: extracted_skills
        description: "Liste des compétences techniques détectées par analyse de mots-clés."

      - name: is_red_flag
        description: "Indicateur booléen pour les offres hors cible (Stage, Alternance, etc.)."
        tests:
          - accepted_values:
              values: [true, false]